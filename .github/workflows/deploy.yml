name: Deploy to Azure

on:
  push:
    branches:
      - main

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/portfolio:${{ github.sha }} .
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/portfolio:${{ github.sha }}
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name portfolio-api-app \
            --resource-group portfolio-rg \
            --docker-custom-image-name-user admin \
            --docker-registry-server-url https://${{ env.REGISTRY_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ env.REGISTRY_USERNAME }} \
            --docker-registry-server-password ${{ env.REGISTRY_PASSWORD }}