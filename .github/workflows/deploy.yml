name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Login to Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/portfolio:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/portfolio:${{ github.sha }}
      
      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name portfolio-api-app \
            --resource-group portfolio-rg \
            --docker-custom-image-name-user admin \
            --docker-registry-server-url https://${{ secrets.REGISTRY_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.REGISTRY_USERNAME }} \
            --docker-registry-server-password ${{ secrets.REGISTRY_PASSWORD }}
          
          az webapp deployment slot auto-swap-set \
            --resource-group portfolio-rg \
            --name portfolio-api-app \
            --auto-swap-slot production || true